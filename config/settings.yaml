# VPN Config Parser settings

# --- Source Manager ---
sources:
  cache_ttl_minutes: 30
  max_concurrent_fetches: 10
  github_api_base: "https://api.github.com"

# --- Validator ---
validator:
  # L1: TCP connect check
  tcp_timeout_seconds: 3
  tcp_concurrency: 200
  # Stop TCP validation once this many alive configs are found (0 = check all)
  tcp_max_alive: 50
  # If more configs than this are parsed, randomly sample before validation
  # (620K configs would take hours; 5000 sample takes ~30s)
  max_configs_to_validate: 5000
  
  # L2: TLS handshake check
  tls_timeout_seconds: 5
  tls_concurrency: 100
  
  # L3: Full proxy test (needs xray-core binary, optional)
  proxy_test_enabled: false
  proxy_test_timeout_seconds: 10
  proxy_test_concurrency: 20
  xray_binary_path: "./bin/xray"
  
  # GeoIP
  geoip_enabled: true
  geoip_api_url: "http://ip-api.com/json/{ip}"

# --- Aggregator ---
aggregator:
  max_configs_in_output: 500
  sort_by: "latency"
  max_per_country: 50

# --- Publisher ---
publisher:
  mode: "repo"
  output_file: "output/subscription.txt"
  commit_message: "auto-update configs [{timestamp}]"

# --- LLM Fallback ---
llm:
  enabled: true
  provider: "gemini"
  model: "gemini-2.0-flash"
  api_key_env: "LLM_API_KEY"
  min_text_length: 100
