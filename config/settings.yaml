# VPN Config Parser settings

# --- Source Manager ---
sources:
  cache_ttl_minutes: 30
  max_concurrent_fetches: 10
  github_api_base: "https://api.github.com"

# --- Validator ---
validator:
  # Country filter — only keep configs from these countries (by remark).
  # No network calls — instant for 620K+ configs.
  # Empty list = keep all. Common: DE, FI, NL, US, GB, FR, JP, SG, CA
  allowed_countries: ["DE", "FI", "NL", "US", "GB", "FR", "JP", "SG", "CA"]
  
  # If more configs than this are parsed, randomly sample before filtering.
  # Set to 0 to process ALL configs (country filter is instant — no network).
  max_configs_to_validate: 0
  
  # SOCKS5 proxy for TCP/TLS validation (optional, only when tcp/tls enabled)
  # proxy_url: "socks5://127.0.0.1:1080"
  
  # TCP/TLS checks are DISABLED by default (instant country filter instead)
  # Set to true to enable network-based liveness checks.
  tcp_enabled: false
  tls_enabled: false
  tcp_timeout_seconds: 5
  tcp_concurrency: 300
  tcp_max_alive: 50
  tls_timeout_seconds: 5
  tls_concurrency: 100
  
  # GeoIP (optional enrichment, disabled by default to avoid rate limits)
  geoip_enabled: false
  geoip_api_url: "http://ip-api.com/json/{ip}"

# --- Aggregator ---
aggregator:
  max_configs_in_output: 75
  sort_by: "country"
  max_per_country: 10

# --- Publisher ---
publisher:
  mode: "repo"
  output_file: "output/subscription.txt"
  commit_message: "auto-update configs [{timestamp}]"

# --- LLM Fallback ---
llm:
  enabled: true
  provider: "gemini"
  model: "gemini-2.0-flash"
  api_key_env: "LLM_API_KEY"
  min_text_length: 100
