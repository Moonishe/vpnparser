# Auto-update VPN configs pipeline.
# Runs on schedule (every hour), on manual dispatch, and on push to main
# (so changes to the pipeline itself are validated end-to-end).
name: Update Configs

on:
  schedule:
    # Every hour, at minute 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "requirements.txt"
      - ".github/workflows/update.yml"

# Cancel a previous run if a new one starts on the same ref.
concurrency:
  group: update-configs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push the updated subscription back to the repo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip" # caches the pip download cache between runs
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q -p no:cacheprovider

      - name: Restore facts cache
        uses: actions/cache/restore@v4
        with:
          path: facts_history.json
          key: facts-history
          restore-keys: |
            facts-history

      - name: Run pipeline
        run: python -m src.main --run --publish
        env:
          # Auto-provided by GitHub Actions; used for both fetching sources
          # (higher API rate limits) and publishing the commit.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Repo owner/name — derived from the workflow context so the
          # publisher knows where to commit the subscription file.
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          # Optional — only needed when llm.enabled is true in settings.yaml.
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          # Optional — SOCKS5 proxy for validation (when running from data center).
          # Set VALIDATOR_PROXY secret to e.g. socks5://user:pass@host:port
          VALIDATOR_PROXY: ${{ secrets.VALIDATOR_PROXY }}

      - name: Verify output
        run: |
          test -f output/subscription.txt || { echo "ERROR: output/subscription.txt not created!"; exit 1; }
          test -f output/subscription-blacklist.txt || { echo "ERROR: output/subscription-blacklist.txt not created!"; exit 1; }
          test -f output/subscription-whitelist.txt || { echo "ERROR: output/subscription-whitelist.txt not created!"; exit 1; }
          # Decode base64 and count configs in the combined subscription.
          CONFIGS=$(python3 -c "
          import base64
          data = open('output/subscription.txt').read().strip()
          try:
              decoded = base64.b64decode(data).decode()
              lines = [l for l in decoded.strip().split('\n') if '://' in l]
              if lines and lines[0].startswith('vmess://'):
                  lines = lines[1:]
              print(len(lines))
          except:
              print(0)
          ")
          echo "configs_count=$CONFIGS" >> $GITHUB_ENV
          echo "Output: $CONFIGS configs"

      - name: Telegram notify
        if: env.configs_count != ''
        run: python -m src.notify.telegram --configs "${{ env.configs_count }}" --file output/subscription.txt
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}

      - name: Save facts cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: facts_history.json
          key: facts-history-${{ github.run_id }}
