# Auto-update VPN configs pipeline.
# Runs on schedule (every hour) and on manual dispatch.
# Push-triggered end-to-end validation is handled by ci.yml.
name: Update Configs

on:
  schedule:
    # Every hour, at minute 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      skip_publish:
        description: "Run pipeline but do not publish output"
        required: false
        default: "false"
        type: boolean

# Cancel a previous run if a new one starts on the same ref.
concurrency:
  group: update-configs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # needed to push the updated subscription back to the repo

env:
  XRAY_VERSION: "v26.3.27" # pin explicitly; update .github/xray.sha256 when bumping

jobs:
  update-configs:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # needed for possible rollback tags

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run lint/typecheck/security checks
        run: |
          ruff check --no-cache src tests
          ruff format --check --no-cache src tests
          mypy --cache-dir=/dev/null src
          bandit -c pyproject.toml -r src
          pip-audit --desc

      - name: Install Xray core
        run: |
          set -euo pipefail
          asset="Xray-linux-64.zip"
          url="https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/${asset}"
          curl -L --retry 3 --retry-delay 2 -o "/tmp/${asset}" "$url"
          if [ -f .github/xray.sha256 ]; then
            echo "Verifying Xray checksum..."
            sed "s|${asset}|/tmp/${asset}|" .github/xray.sha256 > /tmp/xray.sha256
            sha256sum -c /tmp/xray.sha256
          else
            echo "::warning::No checksum file .github/xray.sha256; skipping verification."
          fi
          mkdir -p bin/xray
          unzip -q "/tmp/${asset}" -d bin/xray
          chmod +x bin/xray/xray
          echo "${{ github.workspace }}/bin/xray" >> "$GITHUB_PATH"
          bin/xray/xray version

      - name: Run tests
        run: python -m pytest -q -p no:cacheprovider

      - name: Restore facts cache
        uses: actions/cache/restore@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: facts_history.json
          key: facts-history
          restore-keys: |
            facts-history

      - name: Restore health-history cache
        uses: actions/cache/restore@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: output/health-history.json
          key: health-history
          restore-keys: |
            health-history

      - name: Run pipeline
        id: pipeline
        run: |
          if [ "${{ inputs.skip_publish }}" = "true" ]; then
            python -m src.main --run
          else
            python -m src.main --run --publish
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          VALIDATOR_PROXY: ${{ secrets.VALIDATOR_PROXY }}
          XRAY_EXECUTABLE: ${{ github.workspace }}/bin/xray/xray
          XRAY_LOCATION_ASSET: ${{ github.workspace }}/bin/xray

      - name: Verify output
        id: verify
        run: |
          set -euo pipefail
          test -f output/subscription.txt || { echo "ERROR: output/subscription.txt not created!"; exit 1; }
          test -f output/subscription-mix.txt || { echo "ERROR: output/subscription-mix.txt not created!"; exit 1; }
          test -f output/subscription-blacklist.txt || { echo "ERROR: output/subscription-blacklist.txt not created!"; exit 1; }
          test -f output/subscription-whitelist.txt || { echo "ERROR: output/subscription-whitelist.txt not created!"; exit 1; }
          test -f output/run-summary.json || { echo "ERROR: output/run-summary.json not created!"; exit 1; }
          CONFIGS=$(python3 -c "
          import base64
          data = open('output/subscription.txt').read().strip()
          try:
              decoded = base64.b64decode(data).decode()
              lines = [l for l in decoded.strip().split('\n') if '://' in l]
              if lines and lines[0].startswith('vmess://'):
                  lines = lines[1:]
              print(len(lines))
          except Exception:
              print(0)
          ")
          echo "configs_count=$CONFIGS" >> "$GITHUB_ENV"
          echo "Output: $CONFIGS configs"
          STATUS=$(python3 -c "import json; print(json.load(open('output/run-summary.json')).get('status',''))")
          echo "run_status=$STATUS" >> "$GITHUB_ENV"
          echo "Run status: $STATUS"
          if [ "$CONFIGS" -lt 10 ]; then
            echo "::error::Pipeline produced critically low output ($CONFIGS configs). Aborting publish."
            exit 1
          fi

      - name: Telegram notify
        if: env.configs_count != ''
        run: python -m src.notify.telegram --configs "${{ env.configs_count }}" --file output/subscription.txt --status-file output/run-summary.json
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          GITHUB_BRANCH: ${{ github.ref_name }}

      - name: Save facts cache
        if: always() && hashFiles('facts_history.json') != ''
        uses: actions/cache/save@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: facts_history.json
          key: facts-history-${{ github.run_id }}

      - name: Save health-history cache
        if: always() && hashFiles('output/health-history.json') != ''
        uses: actions/cache/save@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: output/health-history.json
          key: health-history-${{ github.run_id }}

      - name: Alert on failure
        if: failure()
        run: |
          echo "::error::Pipeline or publish failed. Check logs and runbook docs/OPERATIONS.md"