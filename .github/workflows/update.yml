# Auto-update VPN configs pipeline.
# Runs on schedule (every hour), on manual dispatch, and on push to main
# (so changes to the pipeline itself are validated end-to-end).
name: Update Configs

on:
  schedule:
    # Every hour, at minute 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "requirements.txt"
      - ".github/workflows/update.yml"

# Cancel a previous run if a new one starts on the same ref.
concurrency:
  group: update-configs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push the updated subscription back to the repo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip" # caches the pip download cache between runs
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python -m src.main --run --publish
        env:
          # Auto-provided by GitHub Actions; used for both fetching sources
          # (higher API rate limits) and publishing the commit.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Repo owner/name — derived from the workflow context so the
          # publisher knows where to commit the subscription file.
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          # Optional — only needed when llm.enabled is true in settings.yaml.
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          # Optional — SOCKS5 proxy for validation (when running from data center).
          # Set VALIDATOR_PROXY secret to e.g. socks5://user:pass@host:port
          VALIDATOR_PROXY: ${{ secrets.VALIDATOR_PROXY }}

      - name: Verify output
        run: |
          test -f output/subscription.txt || { echo "ERROR: output/subscription.txt not created!"; exit 1; }
          # Decode base64 and count configs
          CONFIGS=$(python3 -c "
          import base64
          data = open('output/subscription.txt').read().strip()
          try:
              decoded = base64.b64decode(data).decode()
              lines = [l for l in decoded.strip().split('\n') if '://' in l]
              print(len(lines))
          except:
              print(0)
          ")
          echo "configs_count=$CONFIGS" >> $GITHUB_ENV
          echo "Output: $CONFIGS configs"

      - name: Telegram notify
        if: env.configs_count != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Skip if no bot token configured
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "No TELEGRAM_BOT_TOKEN secret — skipping notification"
            exit 0
          fi
          MSG="📡 vpnparser обновлён
          ✅ Конфигов: ${{ env.configs_count }}
          🌍 Страны: DE FI NL US GB FR JP SG CA
          🔗 https://raw.githubusercontent.com/${{ github.repository }}/main/output/subscription.txt"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d text="$MSG" \
            -d parse_mode="HTML" \
            || echo "Telegram notify failed (non-fatal)"
